name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build -o slop-chop .
      - run: go build ./...
      - run: GOOS=js GOARCH=wasm go build -o /dev/null ./wasm
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - name: The tells page must match the profile it documents
        run: go run . tells --markdown | diff - docs/TELLS.md
      # Share the compiled binary so the check jobs need no Go toolchain, which keeps them off
      # setup-go, the heavier action whose download was the source of the flaky setup failures.
      - uses: actions/upload-artifact@v4
        with:
          name: slop-chop-binary
          path: slop-chop
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Build golangci-lint from source with the runner's Go so its build version is not
      # older than the go directive in go.mod, which the prebuilt binaries can lag behind.
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: golangci-lint run ./...

  action-passes-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write a clean file
        run: printf 'a plain sentence that reads just fine\n' > clean.md
      - name: Action should pass on clean text
        uses: ./
        with:
          files: clean.md

  action-fixes-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write a slopful file
        run: printf 'In summary, a plan—and it works; it ships.\n' > dirty.md
      - name: Action should rewrite the file in place
        uses: ./
        with:
          files: dirty.md
          mode: fix
      - name: File must be clean afterward
        run: |
          cat dirty.md
          if grep -qE '—|In summary' dirty.md; then
            echo "fix left slop behind" >&2
            exit 1
          fi

  docs-pass-their-own-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: slop-chop-binary
      - run: chmod +x slop-chop
      - name: The docs must pass slop-chop
        run: ./slop-chop check README.md ENGINE.md docs/PROFILE.md docs/PLUGIN.md docs/SLACK.md docs/TELLS.md

  check-fails-on-slop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: slop-chop-binary
      - run: chmod +x slop-chop
      - name: Check must exit non-zero on slop
        run: |
          printf 'In summary, a comprehensive result.\n' > dirty.md
          if ./slop-chop check dirty.md; then
            echo "check passed but should have failed" >&2
            exit 1
          fi
          echo "check failed as expected"
