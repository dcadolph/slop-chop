name: slop-chop
description: Flag AI slop in text and fail the check when it finds any, or fix it in place.
branding:
  icon: scissors
  color: green

inputs:
  files:
    description: Space separated list of files to check or fix.
    required: true
  profile:
    description: Path to a JSON style profile. Leave empty for the built in profile.
    required: false
    default: ""
  mode:
    description: check flags slop and fails the run. fix rewrites the files in place.
    required: false
    default: check
  commit:
    description: In fix mode, commit and push the rewritten files. The workflow needs
      contents write permission for the push to land.
    required: false
    default: "false"
  message:
    description: Commit message used when commit is true.
    required: false
    default: Chop the slop

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
        cache: false

    - name: Build slop-chop
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -o "${RUNNER_TEMP}/slop-chop" .

    - name: Run slop-chop
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        PROFILE: ${{ inputs.profile }}
        MODE: ${{ inputs.mode }}
      run: |
        args=()
        if [ -n "$PROFILE" ]; then args+=(-profile "$PROFILE"); fi
        case "$MODE" in
          check)
            rc=0
            for f in $FILES; do
              echo "::group::slop-chop check $f"
              "${RUNNER_TEMP}/slop-chop" check "${args[@]}" "$f" || rc=1
              echo "::endgroup::"
            done
            if [ "$rc" -ne 0 ]; then
              echo "slop-chop found slop. See the groups above." >&2
            fi
            exit "$rc"
            ;;
          fix)
            for f in $FILES; do
              echo "::group::slop-chop fix $f"
              "${RUNNER_TEMP}/slop-chop" fix "${args[@]}" -w "$f"
              echo "::endgroup::"
            done
            ;;
          *)
            echo "slop-chop: unknown mode '$MODE' (want check or fix)" >&2
            exit 2
            ;;
        esac

    - name: Commit the fixes
      if: ${{ inputs.mode == 'fix' && inputs.commit == 'true' }}
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        MESSAGE: ${{ inputs.message }}
      run: |
        if git diff --quiet -- $FILES; then
          echo "slop-chop: nothing to commit"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -- $FILES
        git commit -m "$MESSAGE"
        git push
